{% extends 'base.html' %}

{% block header_title %}Edit Task{% endblock %}

{% block content %}
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Save</button>
    </form>
    <div style="margin-top:8px; color:#9ca3af; font-size:12px;">
        The task remains in your team, unassigned to any worker, and its status is "To Do" on save.
    </div>
</div>
{% endblock %}
